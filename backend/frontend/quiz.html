<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kansei · Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F0E8;
      --surface: #EDE8DF;
      --border: #D4CEC4;
      --text-primary: #1A1815;
      --text-secondary: #6B6560;
      --text-dim: #A8A29C;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 2rem 3rem;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .v-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin: auto;
    }

    @keyframes blob-drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(45px, -30px) scale(1.15); }
      66% { transform: translate(-30px, 35px) scale(0.9); }
    }

    /* Blobs scaled up to roughly 2-2.5x the viewport's largest dimension —
       at this size the blurred falloff itself becomes the only visible
       transition across the page, so there's no hard "edge" left where
       the tint just stops. Center of the screen will often show a soft
       blend of both aesthetic colors where the two blobs overlap, which
       keeps the same organic, drifting texture rather than turning into
       two flat colored halves. */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0;
      transition: background 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      z-index: 0;
      animation: blob-drift 14s ease-in-out infinite;
    }
    .bg-blob-left {
      width: 1400px;
      height: 1400px;
      top: -500px;
      left: -500px;
    }
    .bg-blob-right {
      width: 1300px;
      height: 1300px;
      bottom: -500px;
      right: -500px;
      animation-delay: -7s;
    }

    .bg-blob.pulse {
      transition: background 0.3s ease, opacity 0.3s ease, transform 0.3s ease !important;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    .top {
      width: 100%;
      max-width: 920px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 10;
    }

    .logo {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      font-weight: 700;
    }

    .counter {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }

    .progress-bar {
      width: 100%;
      max-width: 920px;
      height: 1px;
      background: var(--border);
      margin-bottom: 2.5rem;
      position: relative;
      z-index: 10;
    }
    .progress-fill {
      height: 100%;
      background: var(--text-secondary);
      transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      width: 0%;
    }

    .prompt {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1.5rem;
      text-align: center;
      position: relative;
      z-index: 10;
      font-weight: 700;
    }

    .pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 920px;
      opacity: 1;
      transition: opacity 0.18s ease;
      position: relative;
      z-index: 10;
    }
    .pair.fading { opacity: 0; }

    .card {
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .card:hover {
      border-color: #bbb;
      box-shadow: 0 4px 32px rgba(26,24,21,0.08);
    }

    .card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      filter: grayscale(8%);
    }
    .card:hover img { transform: scale(1.02); filter: grayscale(0%); }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(26,24,21,0.03);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .card:hover .card-overlay { opacity: 1; }

    .card-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 3rem 1.2rem 1.2rem;
      background: linear-gradient(transparent, rgba(245,240,232,0.9));
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-secondary);
      opacity: 0;
      transition: opacity 0.2s;
      font-weight: 700;
    }
    .card:hover .card-label { opacity: 1; }

    .bottom-bar {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
    }

    .skip-btn {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      border: 1px solid var(--border);
      background: rgba(245,240,232,0.8);
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      backdrop-filter: blur(4px);
      font-weight: 700;
    }
    .skip-btn:hover {
      color: var(--text-secondary);
      border-color: #bbb;
      background: var(--surface);
    }

    .loading {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-align: center;
      grid-column: 1 / -1;
      font-weight: 700;
    }

    .card-skeleton {
      width: 100%;
      aspect-ratio: 3/4;
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 600px) {
      body { padding: 1.2rem 1rem 2rem; }
      .pair { grid-template-columns: 1fr; gap: 0.6rem; }
      .card img { aspect-ratio: 4/3; }
      .top { margin-bottom: 1rem; }
      .progress-bar { margin-bottom: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="bg-blob bg-blob-left" id="blob-left"></div>
  <div class="bg-blob bg-blob-right" id="blob-right"></div>

  <div class="v-center">
  <div class="top">
    <span class="logo">◈ KANSEI</span>
    <span class="counter" id="counter">1 / 25</span>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  <p class="prompt">Which pulls you in?</p>

  <div class="pair" id="pair">
    <div class="loading">Loading...</div>
  </div>

  </div>

  <div class="bottom-bar">
    <button class="skip-btn" id="skip">Skip this pair</button>
  </div>

  <script>
    const API = '';
    const TOTAL = 25;

    function getSessionId() {
      let id = sessionStorage.getItem('kansei_sid');
      if(!id){
        id = crypto.randomUUID();
        sessionStorage.setItem('kansei_sid', id);
      }
      return id;
    }

    function track(eventName, meta = null) {
      fetch('/api/event', {
        method: 'POST',
        headers: { 'Content-Type' : 'application/json'},
        body: JSON.stringify({ session_id: getSessionId(), event_name: eventName, meta})
      }).catch(() => {});
    }

    const COLORS = {
      "afrofuturism":"#9B59B6","boho":"#E67E22","brutalism":"#7F8C8D",
      "coastal cool":"#3498DB","cottagecore":"#4A8A5A","cyber minimalism":"#00CED1",
      "cyberpunk":"#CC00CC","dark academia":"#8B6914","ethereal":"#7A5A9A",
      "glam maximalism":"#A07800","quiet luxury":"#5A5550","solarpunk":"#2ECC71",
      "teracotta modernism":"#C86040","vintage americana":"#C84040",
      "wabi sabi":"#7A6A50","zen modern":"#708090",
    };

    let pairs = [];
    let round = 0;
    let chosenVectors = [];
    let choiceHistory = [];
    let choiceLog = [];
    let transitioning = false;
    let centroidCache = {};

    async function init() {
      const aesthetics = Object.keys(COLORS);
      const [pairsRes, ...centroidRes] = await Promise.all([
        fetch(`${API}/api/pairs?n=${TOTAL}`),
        ...aesthetics.map(a => fetch(`${API}/api/centroid/${encodeURIComponent(a)}`))
      ]);

      const pairsData = await pairsRes.json();
      pairs = pairsData.pairs;

      const centroidData = await Promise.all(centroidRes.map(r => r.json()));
      aesthetics.forEach((a, i) => { centroidCache[a] = centroidData[i].vector; });

      track('session_start');
      renderRound();
    }

    function getCentroid(aesthetic) {
      return centroidCache[aesthetic] || null;
    }

    function updateBlobs(leftAesthetic, rightAesthetic) {
      const left = COLORS[leftAesthetic] || '#D4CEC4';
      const right = COLORS[rightAesthetic] || '#D4CEC4';
      const blobLeft = document.getElementById('blob-left');
      const blobRight = document.getElementById('blob-right');
      blobLeft.style.background = left;
      blobLeft.style.opacity = '0.32';
      blobRight.style.background = right;
      blobRight.style.opacity = '0.28';
    }

    function pulseBlobs() {
      const blobLeft = document.getElementById('blob-left');
      const blobRight = document.getElementById('blob-right');
      [blobLeft, blobRight].forEach(blob => {
        blob.classList.add('pulse');
        blob.style.transform = 'scale(1.15)';
        setTimeout(() => {
          blob.style.transform = '';
          setTimeout(() => blob.classList.remove('pulse'), 350);
        }, 180);
      });
    }

    async function choose(aesthetic) {
      if (transitioning) return;
      transitioning = true;
      pulseBlobs();

      const pairEl = document.getElementById('pair');
      pairEl.classList.add('fading');

      const vector = getCentroid(aesthetic);
      if (vector) chosenVectors.push(vector);
      choiceHistory.push({ aesthetic, round });

      const pair = pairs[round];
      const rejected = pair.left.aesthetic === aesthetic
        ? pair.right.aesthetic
        : pair.left.aesthetic;
      choiceLog.push({ chosen: aesthetic, rejected });

      round++;

      await sleep(200);

      if (round >= TOTAL) {
        sessionStorage.setItem('kansei_vectors', JSON.stringify(chosenVectors));
        sessionStorage.setItem('kansei_choices', JSON.stringify(choiceHistory));
        sessionStorage.setItem('kansei_choice_log', JSON.stringify(choiceLog));
        track('quiz_complete');
        window.location.href = '/result';
      } else {
        renderRound();
        pairEl.classList.remove('fading');
        transitioning = false;
      }
    }

    function renderRound() {
      const pair = pairs[round];
      const pct = (round / TOTAL) * 100;

      document.getElementById('counter').textContent = `${round + 1} / ${TOTAL}`;
      document.getElementById('progress').style.width = `${pct}%`;

      updateBlobs(pair.left.aesthetic, pair.right.aesthetic);

      const container = document.getElementById('pair');
      container.innerHTML = `
        <div class="card" id="card-left">
          <div class="card-skeleton" id="skel-left"></div>
          <img src="${API}/images/${encodeURIComponent(pair.left.aesthetic)}/${encodeURIComponent(pair.left.image)}"
               style="display:none" alt=""
               onload="this.style.display='block';document.getElementById('skel-left').style.display='none'"
               onerror="document.getElementById('skel-left').style.display='none';this.style.display='block'" />
          <div class="card-overlay"></div>
          <div class="card-label">Choose</div>
        </div>
        <div class="card" id="card-right">
          <div class="card-skeleton" id="skel-right"></div>
          <img src="${API}/images/${encodeURIComponent(pair.right.aesthetic)}/${encodeURIComponent(pair.right.image)}"
               style="display:none" alt=""
               onload="this.style.display='block';document.getElementById('skel-right').style.display='none'"
               onerror="document.getElementById('skel-right').style.display='none';this.style.display='block'" />
          <div class="card-overlay"></div>
          <div class="card-label">Choose</div>
        </div>
      `;

      document.getElementById('card-left').addEventListener('click', () => choose(pair.left.aesthetic));
      document.getElementById('card-right').addEventListener('click', () => choose(pair.right.aesthetic));
    }

    document.getElementById('skip').addEventListener('click', async () => {
      if (transitioning) return;
      transitioning = true;
      const pairEl = document.getElementById('pair');
      pairEl.classList.add('fading');
      round++;
      await sleep(200);
      if (round >= TOTAL) {
        sessionStorage.setItem('kansei_vectors', JSON.stringify(chosenVectors));
        sessionStorage.setItem('kansei_choices', JSON.stringify(choiceHistory));
        sessionStorage.setItem('kansei_choice_log', JSON.stringify(choiceLog));
        track('quiz_complete');
        window.location.href = '/result';
      } else {
        renderRound();
        pairEl.classList.remove('fading');
        transitioning = false;
      }
    });

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    init();
  </script>
</body>
</html>
